# Phase 2: VICReg Self-Supervised Pretraining on FK Spectra
# Fallback after MAE reconstruction objective failed (embedding collapse).
#
# VICReg learns embeddings via three explicit regularizers:
#   - Invariance: two augmented views of the same spectrum agree
#   - Variance: each embedding dimension has std ≥ 1 (prevents collapse)
#   - Covariance: embedding dimensions are decorrelated

# ── Data ──────────────────────────────────────────────────────────
manifest_path: "data/processed/manifest.json"
val_fraction: 0.10
val_seed: 42

# ── Model ─────────────────────────────────────────────────────────
# ViT-Small encoder (same as Phase 0) + projector MLP
img_size: 256
patch_size: 16
in_channels: 1
embed_dim: 384
depth: 12
num_heads: 6
mlp_ratio: 4.0
projector_hidden_dim: 2048
projector_out_dim: 2048

# ── VICReg Loss Weights ──────────────────────────────────────────
sim_weight: 25.0   # λ — invariance (MSE between views)
var_weight: 25.0   # µ — variance (hinge loss, std ≥ 1)
cov_weight: 1.0    # ν — covariance (off-diagonal regularization)

# ── Augmentation (aggressive, same as MAE v3) ────────────────────
noise_std: 0.15
intensity_jitter: 0.50
freq_shift_max: 0.10
waven_shift_max: 0.05
freq_dropout_prob: 0.30
freq_dropout_width: 0.08

# ── Training ──────────────────────────────────────────────────────
batch_size: 16        # larger batch stabilises variance estimate
accum_steps: 1        # no grad-accum needed at batch=16 (VRAM ~3 GB)
epochs: 100
lr: 3.0e-04          # higher LR than MAE (VICReg is more stable)
weight_decay: 1.0e-06 # very light decay (VICReg paper uses none)
betas: [0.9, 0.95]
warmup_ratio: 0.1
grad_clip_norm: 1.0
seed: 42

# ── System ────────────────────────────────────────────────────────
num_workers: 0
pin_memory: true

# ── Logging ───────────────────────────────────────────────────────
log_interval: 50
visualization_epochs: [10, 25, 50, 100]
