# Phase 2C: CNN pseudo-label classifier (conservative augmentations)
# Trains a shallow CNN directly on raw 256×256 spectra.

# Data paths
manifest_path: "data/processed/manifest.json"
pseudo_labels_path: "data/processed/pseudo_labels.npz"
feature_path: "data/processed/features/features_descriptors.npz"

# Model selection
#   true  -> MLPClassifier on pre-extracted features
#   false -> ShallowCNNClassifier on raw spectra
use_features: false

# MLP architecture (unused when use_features=false)
mlp_hidden_dims: [256, 128]
mlp_dropout: 0.2

# CNN architecture
cnn_dropout: 0.3

# Augmentation (conservative: noise + intensity jitter only)
# Applied inside model.forward() during training only.
augment_noise_std: 0.05
augment_intensity_jitter: 0.15
augment_freq_shift_max: 0.0
augment_waven_shift_max: 0.0
augment_freq_dropout_prob: 0.0
augment_freq_dropout_width: 0.05

# Training
batch_size: 16
accum_steps: 1
epochs: 50
lr: 0.0003
weight_decay: 0.05
betas: [0.9, 0.95]
warmup_ratio: 0.1
grad_clip_norm: 1.0
seed: 42

# System
num_workers: 4
pin_memory: true

# Logging
log_interval: 50
