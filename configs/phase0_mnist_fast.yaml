# Phase 0: MNIST Smoke Test Configuration — Fast / Light Decoder Variant
# Changes from baseline:
#   * batch_size=32, accum_steps=1 (no gradient accumulation overhead)
#   * decoder_depth=2, decoder_num_heads=4 (lighter decoder per original MAE idea)

# Data
image_size: 256
patch_size: 16
in_channels: 1

# Masking
mask_ratio: 0.75
use_block_masking: true
block_size: 2

# Model
embed_dim: 384
depth: 12
num_heads: 6
mlp_ratio: 4.0
decoder_embed_dim: 256
decoder_depth: 2
decoder_num_heads: 4

# Training
batch_size: 32
accum_steps: 1
epochs: 5
lr: 0.0001
weight_decay: 0.05
betas: [0.9, 0.95]
warmup_ratio: 0.1
grad_clip_norm: 1.0

# Reproducibility
seed: 42

# System
num_workers: 0
pin_memory: true

# Logging
log_interval: 50
